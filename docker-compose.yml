services:
  postgres:
    image: postgres:16
    container_name: birfikrimvar-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1499270510cA.
      POSTGRES_DB: BirFikrimVarDb

    ports:
      - "5433:5432"

    volumes:
      - birfikrimvar_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: birfikrimvar-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - birfikrimvar_minio:/data

  api:
    build:
      context: .
      dockerfile: BirFikrimVar.API/Dockerfile

    container_name: birfikrimvar-api
    restart: unless-stopped

    depends_on:
      - postgres
      - minio

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=BirFikrimVarDb;Username=postgres;Password=1499270510cA.;Include Error Detail=true
      AppSettings__WebMvcUrl: http://localhost:5001
      Minio__Endpoint: http://minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin123
      Minio__BucketName: birfikrimvar-uploads
    ports:
      - "5000:8080"


  web:
    build:
      context: .
      dockerfile: BirFikrimVar.Web/Dockerfile

    container_name: birfikrimvar-web
    restart: unless-stopped

    depends_on:
      - api

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AppSettings__ApiBaseUrl: http://api:8080/api/

    ports:
      - "5001:8080"

volumes:
  birfikrimvar_pgdata:
  birfikrimvar_minio:
