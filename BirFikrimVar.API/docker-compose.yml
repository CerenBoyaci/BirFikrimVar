services:
  postgres:
    image: postgres:16
    container_name: birfikrimvar-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1499270510cA.
      POSTGRES_DB: BirFikrimVarDb

    ports:
      - "5433:5432"

    volumes:
      - birfikrimvar_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: birfikrimvar-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "8080:80"

volumes:
  birfikrimvar_pgdata: